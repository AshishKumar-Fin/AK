<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E-Commerce — Exam Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08090f;
  --bg2:#0d1117;
  --bg3:#141b27;
  --bg4:#1a2235;
  --border:#1f2d42;
  --border2:#263548;
  --text:#ffffff;
  --text-secondary:#d0dae8;
  --text-muted:#8ba3bf;
  --c1:#a78bfa;
  --c2:#7c3aed;
  --c3:#f5a623;
  --c4:#e05c7a;
  --c5:#22d3b0;
  --c6:#60a5fa;
  --c7:#fb923c;
  --card:#0f1622;
  --sidebar-w:270px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
.site-header{
  background:linear-gradient(160deg,#08090f 0%,#0e0d24 50%,#08090f 100%);
  border-bottom:1px solid var(--border);
  padding:2.2rem 2rem 1.8rem;
  text-align:center;
  position:relative;overflow:hidden;
}
.site-header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(167,139,250,.08) 0%,transparent 65%);
  pointer-events:none;
}
.site-header h1{
  font-family:'Libre Baskerville',serif;
  font-size:clamp(1.4rem,2.8vw,2.1rem);
  font-weight:700;line-height:1.2;
  background:linear-gradient(130deg,#fff 20%,#c4b5fd 65%,#22d3b0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:0;
}

/* ── PROGRESS ── */
.prog-bar-wrap{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:.8rem 2rem;display:flex;align-items:center;gap:1rem;
  flex-wrap:wrap;justify-content:center;
}
.prog-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:#c8d8ea;letter-spacing:.06em;}
.prog-outer{flex:1;min-width:160px;max-width:380px;height:5px;background:var(--bg4);border-radius:99px;overflow:hidden;}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--c1),var(--c5));border-radius:99px;transition:width .5s ease;width:0%;}
.prog-count{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:#a5f3e0;font-weight:500;}

/* ── UNIT TABS ── */
.unit-nav{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:.7rem 1rem;display:flex;flex-wrap:wrap;gap:.3rem;justify-content:center;
  position:sticky;top:0;z-index:200;
}
.unit-btn{
  font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;
  padding:.4rem 1.1rem;border-radius:.45rem;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap;
  letter-spacing:.02em;
}
.unit-btn:hover{border-color:var(--c6);color:#fff;}
.unit-btn.active{
  background:rgba(167,139,250,.15);
  border-color:var(--c1);color:#fff;
}
.unit-btn.done::after{content:' ✓';color:var(--c5);}

/* ── MAIN LAYOUT ── */
.layout{
  display:flex;
  min-height:calc(100vh - 180px);
}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:var(--bg2);
  border-right:1px solid var(--border);
  position:sticky;
  top:95px; /* below sticky unit nav */
  height:calc(100vh - 95px);
  overflow-y:auto;
  padding:1.2rem .85rem;
  flex-shrink:0;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-track{background:transparent;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

.sidebar-heading{
  font-family:'JetBrains Mono',monospace;
  font-size:.62rem;text-transform:uppercase;letter-spacing:.13em;
  color:#c8d8ea;margin-bottom:.85rem;padding:0 .4rem;
}

.core-topic-btn{
  display:flex;align-items:center;gap:.65rem;
  width:100%;padding:.65rem .75rem;
  border-radius:.5rem;border:none;
  background:transparent;
  color:var(--text-secondary);
  font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:500;
  cursor:pointer;transition:all .18s;
  text-align:left;margin-bottom:.2rem;line-height:1.35;
}
.core-topic-btn:hover{background:rgba(255,255,255,.04);color:#fff;}
.core-topic-btn.active{
  background:rgba(167,139,250,.12);
  color:#fff;
  border-left:2.5px solid var(--c1);
  padding-left:calc(.75rem - 2.5px);
}
.core-topic-btn .ct-num{
  font-family:'JetBrains Mono',monospace;
  font-size:.65rem;color:var(--text-muted);
  background:var(--bg3);border-radius:.28rem;
  padding:.08rem .38rem;flex-shrink:0;
  transition:all .18s;
}
.core-topic-btn.active .ct-num{background:rgba(167,139,250,.2);color:var(--c1);}
.core-topic-btn .ct-label{flex:1;}
.core-topic-btn .ct-check{
  font-size:.7rem;color:var(--c5);
  background:rgba(34,211,176,.12);
  border-radius:.28rem;padding:.08rem .38rem;
  flex-shrink:0;font-weight:700;
}
.core-topic-btn.ct-done .ct-num{background:rgba(34,211,176,.15);color:var(--c5);}
.core-topic-btn.ct-done .ct-label{color:#8ecfc4;}
.btn-done{
  background:rgba(34,211,176,.12) !important;
  border:1px solid rgba(34,211,176,.3) !important;
  color:var(--c5) !important;
  cursor:default !important;
  transform:none !important;
}

/* ── CONTENT AREA ── */
.content-area{
  flex:1;
  padding:2rem 2.5rem 4rem;
  min-width:0;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  align-items:center;   /* centre the inner wrapper */
}
.content-inner{
  width:100%;
  max-width:900px;      /* comfortable reading width */
}

/* Welcome screen */
.welcome-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:400px;text-align:center;opacity:.6;
}
.welcome-screen .wi{font-size:2.5rem;margin-bottom:1rem;}
.welcome-screen h3{font-family:'Libre Baskerville',serif;font-size:1.2rem;margin-bottom:.5rem;color:#fff;}
.welcome-screen p{font-size:.87rem;color:var(--text-muted);}

/* Core topic panel header */
.ct-panel-hdr{
  margin-bottom:1.8rem;
  padding-bottom:1.2rem;
  border-bottom:1px solid var(--border);
}
.ct-panel-hdr .ct-tag{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  text-transform:uppercase;letter-spacing:.12em;
  color:var(--c1);margin-bottom:.5rem;
}
.ct-panel-hdr h2{
  font-family:'Libre Baskerville',serif;
  font-size:1.35rem;font-weight:700;color:#fff;
  line-height:1.3;
}

/* ── TOPIC CARDS (collapsible) ── */
.topic-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:.85rem;margin-bottom:1rem;overflow:hidden;
  transition:border-color .2s;
}
.topic-card:hover{border-color:var(--border2);}
.topic-card.open{border-color:rgba(167,139,250,.25);}

.topic-head{
  display:flex;align-items:center;gap:.9rem;
  padding:1.05rem 1.35rem;cursor:pointer;user-select:none;
  transition:background .15s;
}
.topic-head:hover{background:rgba(255,255,255,.02);}

.t-icon{
  width:2rem;height:2rem;border-radius:.4rem;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;flex-shrink:0;
}
.ti-a{background:rgba(167,139,250,.14);}
.ti-b{background:rgba(34,211,176,.12);}
.ti-c{background:rgba(245,166,35,.12);}
.ti-d{background:rgba(96,165,250,.11);}
.ti-e{background:rgba(224,92,122,.1);}

.topic-title{
  font-weight:600;font-size:.92rem;flex:1;
  line-height:1.4;color:#fff;
}
.topic-arrow{
  color:#c8d8ea;font-size:.8rem;
  transition:transform .25s;flex-shrink:0;
}
.topic-card.open .topic-arrow{transform:rotate(180deg);}

.topic-body{
  display:none;
  padding:0 1.35rem 1.4rem;
  border-top:1px solid var(--border);
  animation:fadeBody .2s ease;
}
@keyframes fadeBody{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
.topic-card.open .topic-body{display:block;}
.topic-body>*:first-child{margin-top:1.1rem;}

/* ── CONTENT ELEMENTS ── */
.prose{font-size:.89rem;line-height:1.9;color:#d0dae8;}
.prose strong{color:#fff;}
.prose h4{color:#fff;font-size:.93rem;font-weight:600;margin:1.1rem 0 .45rem;}
.prose ul,.prose ol{padding-left:1.4rem;margin:.5rem 0;}
.prose li{margin-bottom:.4rem;color:#d0dae8;}
.prose p{margin-bottom:.7rem;}

.def-box{
  background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.2);
  border-radius:.6rem;padding:1rem 1.25rem;margin:1rem 0;
}
.def-lbl{font-family:'JetBrains Mono',monospace;font-size:.62rem;
  text-transform:uppercase;letter-spacing:.12em;color:var(--c1);margin-bottom:.4rem;font-weight:600;}
.def-box p{font-size:.88rem;line-height:1.8;color:#d4c8ff;margin:0;}

.fin-panel{
  background:rgba(34,211,176,.04);border:1px solid rgba(34,211,176,.18);
  border-radius:.7rem;padding:1.1rem 1.3rem;margin:1rem 0;
}
.fin-panel-hdr{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem;}
.fp-icon{font-size:.95rem;}
.fp-title{font-family:'JetBrains Mono',monospace;font-size:.65rem;
  text-transform:uppercase;letter-spacing:.1em;color:var(--c5);font-weight:600;}
.fin-item{display:flex;gap:.65rem;margin-bottom:.65rem;align-items:flex-start;}
.fin-item:last-child{margin-bottom:0;}
.fin-num{
  font-family:'JetBrains Mono',monospace;font-size:.7rem;
  color:var(--c5);background:rgba(34,211,176,.12);
  border-radius:.28rem;padding:.12rem .4rem;flex-shrink:0;margin-top:.1rem;font-weight:600;
}
.fin-text{font-size:.86rem;line-height:1.75;color:#a5ede3;}
.fin-text strong{color:#d0f8f1;}

.kp-box{
  background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.18);
  border-radius:.65rem;padding:1rem 1.25rem;margin:1rem 0;
}
.kp-lbl{font-family:'JetBrains Mono',monospace;font-size:.62rem;
  text-transform:uppercase;letter-spacing:.12em;color:var(--c6);margin-bottom:.45rem;font-weight:600;}
.kp-box ul{padding-left:1.25rem;font-size:.86rem;color:#bdd5f5;line-height:1.78;}
.kp-box li{margin-bottom:.3rem;}

.etip{
  border-left:3px solid var(--c3);
  background:rgba(245,166,35,.05);
  border-radius:0 .5rem .5rem 0;
  padding:.85rem 1.1rem;margin:1rem 0;
  font-size:.86rem;line-height:1.78;color:#e8cc8a;
}
.etip-lbl{font-size:.63rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--c3);margin-bottom:.3rem;font-weight:600;}

mark{background:rgba(167,139,250,.16);color:#c4b5fd;padding:.08em .28em;border-radius:.22em;}
mark.g{background:rgba(34,211,176,.13);color:var(--c5);}

/* ── BOTTOM NAV ── */
.bottom-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:2.2rem;padding-top:1.4rem;
  border-top:1px solid var(--border);gap:1rem;
}
.bn-info{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:#c8d8ea;}
.btn{
  font-family:'Outfit',sans-serif;font-weight:600;font-size:.84rem;
  padding:.65rem 1.5rem;border-radius:.55rem;cursor:pointer;border:none;
  transition:all .2s;display:flex;align-items:center;gap:.45rem;
}
.btn-primary{background:linear-gradient(135deg,var(--c1),#5b21b6);color:#fff;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.btn-secondary{background:var(--bg3);border:1px solid var(--border2);color:#fff;}
.btn-secondary:hover:not(:disabled){border-color:var(--text-muted);background:var(--bg4);}
.btn:disabled{opacity:.25;cursor:not-allowed;transform:none!important;}

/* ── RESET BUTTON ── */
.reset-btn{
  position:absolute;top:1rem;right:1.2rem;
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  letter-spacing:.08em;text-transform:uppercase;
  background:rgba(224,92,122,.08);border:1px solid rgba(224,92,122,.25);
  color:rgba(224,92,122,.75);
  padding:.3rem .75rem;border-radius:.4rem;cursor:pointer;
  transition:all .2s;
}
.reset-btn:hover{
  background:rgba(224,92,122,.16);
  border-color:rgba(224,92,122,.5);
  color:#e05c7a;
}

/* ── RESPONSIVE ── */
@media(max-width:720px){
  .sidebar{display:none;}
  .content-area{padding:1.2rem 1rem 3rem;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <h1>E-COMMERCE</h1>
  <button class="reset-btn" onclick="resetProgress()" title="Reset all progress">↺ Reset</button>
</header>

<!-- PROGRESS BAR -->
<div class="prog-bar-wrap">
  <span class="prog-label">PROGRESS</span>
  <div class="prog-outer"><div class="prog-inner" id="pbar"></div></div>
  <span class="prog-count" id="pcnt">0 / 5 completed</span>
</div>

<!-- UNIT TABS -->
<nav class="unit-nav" id="unitnav"></nav>

<!-- MAIN LAYOUT -->
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-heading">Core Topics</div>
    <div id="sidebar-list"></div>
  </aside>
  <main class="content-area" id="content-area">
    <div class="content-inner">
      <div class="welcome-screen" id="welcome-screen">
        <div class="wi">📚</div>
        <h3>Select a topic to begin</h3>
        <p>Choose a core topic from the sidebar to view its content.</p>
      </div>
      <div id="topic-panel" style="display:none;"></div>
    </div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA — SAMPLE (2-line content per topic)
// ═══════════════════════════════════════════════
const UNITS = [
{
  id:"U1", label:"UNIT 1", title:"Introduction to E-Commerce",
  color:"#a78bfa",
  coreTopics:[
    {
      id:"U1C1",
      label:"Overview of E-Commerce",
      topics:[
        {
          icon:"📘", cls:"ti-a",
          title:"Definition & Scope of E-Commerce",
          body:`
<div class="def-box"><div class="def-lbl">Definition</div>
<p>E-Commerce refers to buying and selling of goods, services, and information over electronic networks, primarily the internet. It encompasses all digital transactions between businesses, consumers, and governments.</p></div>
<div class="prose">
<p>The scope of e-commerce extends beyond simple online shopping — it includes digital payments, electronic data interchange (EDI), supply chain management, and online customer service systems.</p>
<ul>
<li><strong>B2C:</strong> Amazon, Flipkart — businesses selling directly to consumers online.</li>
<li><strong>B2B:</strong> IndiaMART — businesses transacting with other businesses electronically.</li>
</ul>
</div>
<div class="fin-panel"><div class="fin-panel-hdr"><span class="fp-icon">🏦</span><span class="fp-title">Finance Application</span></div>
<div class="fin-item"><span class="fin-num">1</span><div class="fin-text"><strong>Digital Payments:</strong> Razorpay processes e-commerce transactions enabling seamless UPI, card, and wallet checkout for 5M+ businesses — core e-commerce infrastructure in financial services.</div></div>
<div class="fin-item"><span class="fin-num">2</span><div class="fin-text"><strong>Buy Now Pay Later (BNPL):</strong> Paytm Postpaid and LazyPay embed credit into the e-commerce checkout — transforming transactional e-commerce into a financial product delivery channel.</div></div>
</div>
<div class="kp-box"><div class="kp-lbl">🔑 Key Points</div><ul>
<li>E-Commerce = electronic buying, selling, and exchange of information over networks</li>
<li>4 models: B2C, B2B, C2C (OLX), G2C (government portals)</li>
<li>Scope: transactions, payments, logistics, customer service, supply chain</li>
</ul></div>`
        },
        {
          icon:"🌐", cls:"ti-b",
          title:"Types of E-Commerce Models",
          body:`
<div class="prose">
<p>E-Commerce models are classified based on who the transaction parties are — business, consumer, or government. Each model has distinct dynamics, revenue models, and strategic considerations.</p>
<p><strong>B2B e-commerce</strong> accounts for the largest share of global e-commerce value, as industrial procurement, wholesale, and supply chain transactions dwarf retail volumes in aggregate.</p>
</div>
<div class="kp-box"><div class="kp-lbl">🔑 Key Points</div><ul>
<li>B2C: direct to consumer (Amazon, Myntra)</li>
<li>B2B: business procurement (IndiaMART, Alibaba)</li>
<li>C2C: consumer to consumer (OLX, eBay)</li>
<li>G2C: government to citizen (IRCTC, DigiLocker)</li>
</ul></div>`
        },
        {
          icon:"📈", cls:"ti-c",
          title:"E-Commerce Growth Drivers in India",
          body:`
<div class="prose">
<p>India's e-commerce market is projected to reach $350 billion by 2030, driven by smartphone penetration, affordable data (Jio effect), digital payments infrastructure (UPI), and a young aspirational demographic.</p>
<p>Key growth enablers include: ONDC (Open Network for Digital Commerce) democratizing e-commerce access, increasing Tier-2/3 city penetration, and logistics infrastructure expansion (Delhivery, Ecom Express).</p>
</div>
<div class="etip"><div class="etip-lbl">📝 Exam Angle</div>Always connect India's e-commerce growth to UPI adoption — 10 billion monthly UPI transactions (2024) are the payment rails on which e-commerce growth rides. This linkage earns extra marks.</div>`
        }
      ]
    },
    {
      id:"U1C2",
      label:"E-Commerce Infrastructure",
      topics:[
        {
          icon:"🖥️", cls:"ti-d",
          title:"Technology Stack for E-Commerce",
          body:`
<div class="prose">
<p>An e-commerce platform's technology stack includes the frontend (what users see), backend (business logic, inventory, payments), and infrastructure (cloud hosting, CDN, security). Each layer must be optimized for speed, scalability, and security.</p>
<p>Modern e-commerce stacks favor headless commerce architecture — separating the frontend display layer from the backend commerce engine, enabling faster iteration and omnichannel delivery from a single backend.</p>
</div>
<div class="kp-box"><div class="kp-lbl">🔑 Key Points</div><ul>
<li>Frontend: React/Next.js for fast, interactive UI</li>
<li>Backend: Node.js, Java microservices for scalability</li>
<li>Payment gateway: Razorpay, PayU, CCAvenue</li>
<li>Cloud: AWS, Azure for elastic scaling during sales events</li>
</ul></div>`
        },
        {
          icon:"🔐", cls:"ti-e",
          title:"Security in E-Commerce",
          body:`
<div class="prose">
<p>E-commerce security encompasses protecting transactions, customer data, and platform integrity from fraud, breaches, and attacks. SSL/TLS encryption, PCI-DSS compliance, and two-factor authentication are the foundational security requirements for any e-commerce operation.</p>
<p>Fraud prevention uses real-time ML models to flag suspicious transactions — analyzing device fingerprint, location, purchase pattern, and behavioral anomalies simultaneously.</p>
</div>
<div class="fin-panel"><div class="fin-panel-hdr"><span class="fp-icon">🏦</span><span class="fp-title">Finance Application</span></div>
<div class="fin-item"><span class="fin-num">1</span><div class="fin-text"><strong>PCI-DSS Compliance:</strong> Every e-commerce platform processing card payments must comply with Payment Card Industry Data Security Standard — mandating encrypted transmission, secure storage, and regular security audits.</div></div>
<div class="fin-item"><span class="fin-num">2</span><div class="fin-text"><strong>UPI Fraud Prevention:</strong> NPCI's risk engine analyzes 10B+ monthly UPI transactions in real-time using ML to flag and block suspicious transfers — protecting both e-commerce merchants and consumers.</div></div>
</div>`
        }
      ]
    },
    {
      id:"U1C3",
      label:"Digital Payment Systems",
      topics:[
        {
          icon:"💳", cls:"ti-a",
          title:"Payment Gateways & Methods",
          body:`
<div class="prose">
<p>A payment gateway is the technology infrastructure that authorizes and processes digital payments between a buyer and a seller — connecting the e-commerce platform to banks, card networks, and wallet providers. It encrypts payment data and routes transactions through the appropriate payment rails.</p>
<p>India's payment ecosystem is uniquely diverse: UPI (40% market share), credit/debit cards (25%), net banking (15%), wallets (10%), BNPL (growing rapidly). Each method has different adoption curves, cost structures, and consumer preference patterns by segment.</p>
</div>
<div class="kp-box"><div class="kp-lbl">🔑 Key Points</div><ul>
<li>Gateway vs. Processor vs. Acquirer — distinct roles in the payment chain</li>
<li>UPI dominates Indian e-commerce — zero merchant discount rate (MDR)</li>
<li>Checkout conversion is critically sensitive to payment method availability</li>
</ul></div>`
        }
      ]
    }
  ]
},

{
  id:"U2", label:"UNIT 2", title:"Online Consumer Behavior",
  color:"#22d3b0",
  coreTopics:[
    {
      id:"U2C1",
      label:"Digital Customer Journey",
      topics:[
        {
          icon:"🔄", cls:"ti-b",
          title:"ZMOT & Online Decision Making",
          body:`
<div class="prose">
<p>The Zero Moment of Truth (ZMOT) describes the consumer's independent online research phase that occurs before any brand contact — fundamentally reshaping how e-commerce brands must approach customer acquisition and awareness.</p>
<p>In e-commerce, ZMOT manifests as: Google searches, YouTube product reviews, Reddit community recommendations, and Instagram exploration — all before the consumer visits a product page.</p>
</div>`
        }
      ]
    },
    {
      id:"U2C2",
      label:"Search & Discovery",
      topics:[
        {
          icon:"🔍", cls:"ti-c",
          title:"SEO for E-Commerce",
          body:`
<div class="prose">
<p>Search Engine Optimization for e-commerce focuses on ranking product and category pages for commercial-intent queries — "buy running shoes online," "best laptop under 50000." The goal is to capture demand at the highest-intent moment in the consumer journey.</p>
<p>E-commerce SEO is distinct from content SEO: it requires optimizing thousands of product pages at scale, managing duplicate content from product variants, and building structured data (schema markup) for rich product snippets in search results.</p>
</div>`
        }
      ]
    }
  ]
},

{
  id:"U3", label:"UNIT 3", title:"E-Commerce Strategy & Marketing",
  color:"#f5a623",
  coreTopics:[
    {
      id:"U3C1",

<div class="prose">
<p>Performance marketing is a digital advertising model where brands pay only for measurable outcomes — clicks, leads, or purchases — rather than impressions. It is the dominant acquisition model for e-commerce given its ROI measurability and budget efficiency.</p>
<p>Key channels: Google Shopping Ads (capture purchase intent), Meta Dynamic Ads (retarget browsers who didn't convert), affiliate networks (commission-based traffic from comparison sites and influencers).</p>

},

{

  color:"#60a5fa",
  coreTopics:[
    {
      id:"U4C1",
      label:"E-Commerce Fulfillment",
      topics:[

// ═══════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════

// ── localStorage persistence ──
const LS_KEY = 'ecom_guide_done_v1';

function loadCompleted() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { return new Set(); }
}

function saveCompleted() {
  try { localStorage.setItem(LS_KEY, JSON.stringify([...completed])); } catch(e) {}
}

// Preload saved state
let activeUnitIdx = 0;
let activeCoreTopic = null;
const completed = loadCompleted();

// Total core topics (denominator) — computed once
const TOTAL_CORE = UNITS.reduce((s, u) => s + u.coreTopics.length, 0);

const unitNav    = document.getElementById('unitnav');
const sidebarList  = document.getElementById('sidebar-list');
const welcomeScreen = document.getElementById('welcome-screen');
const topicPanel   = document.getElementById('topic-panel');

// ── Build unit tabs ──
UNITS.forEach((unit, ui) => {
  const btn = document.createElement('button');
  btn.className = 'unit-btn' + (ui === 0 ? ' active' : '');
  btn.textContent = unit.label;
  btn.onclick = () => selectUnit(ui);
  unitNav.appendChild(btn);
});

// ── Update progress bar & label ──
function updateProgress() {
  const pct = Math.round((completed.size / TOTAL_CORE) * 100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('pcnt').textContent =
    `${completed.size} / ${TOTAL_CORE} Core Topics Covered`;
}

// ── Unit selection ──
function selectUnit(ui) {
  activeUnitIdx = ui;
  activeCoreTopic = null;
  document.querySelectorAll('.unit-btn').forEach((b, i) => b.classList.toggle('active', i === ui));
  buildSidebar(UNITS[ui]);
  welcomeScreen.style.display = 'flex';
  topicPanel.style.display = 'none';
}

// ── Sidebar builder — shows ✓ tick for done topics ──
function buildSidebar(unit) {
  sidebarList.innerHTML = '';
  unit.coreTopics.forEach((ct, ci) => {
    const isDone = completed.has(ct.id);
    const btn = document.createElement('button');
    btn.className = 'core-topic-btn' + (isDone ? ' ct-done' : '');
    btn.id = 'sb-' + ct.id;
    btn.innerHTML = `
      <span class="ct-num">${String(ci + 1).padStart(2, '0')}</span>
      <span class="ct-label">${ct.label}</span>
      ${isDone ? '<span class="ct-check">✓</span>' : ''}`;
    btn.onclick = () => selectCoreTopic(ct, btn, unit.color);
    sidebarList.appendChild(btn);
  });
}

// ── Core topic selection ──
function selectCoreTopic(ct, btn, unitColor) {
  activeCoreTopic = ct.id;
  document.querySelectorAll('.core-topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  welcomeScreen.style.display = 'none';
  topicPanel.style.display = 'block';
  topicPanel.innerHTML = buildCoreTopicPanel(ct, unitColor);
  document.getElementById('content-area').scrollTop = 0;
}

// ── Build content panel for a core topic ──
function buildCoreTopicPanel(ct, unitColor) {
  const isDone = completed.has(ct.id);
  const topicsHTML = ct.topics.map((t, ti) => `
    <div class="topic-card" id="tc-${ct.id}-${ti}">
      <div class="topic-head" onclick="toggleCard('${ct.id}', ${ti})">
        <div class="t-icon ${t.cls}">${t.icon}</div>
        <div class="topic-title">${t.title}</div>
        <div class="topic-arrow">▼</div>
      </div>
      <div class="topic-body">${t.body}</div>
    </div>`).join('');

  return `
    <div class="ct-panel-hdr">
      <div class="ct-tag" style="color:${unitColor}">${UNITS[activeUnitIdx].label} · Core Topic</div>
      <h2>${ct.label}</h2>
    </div>
    ${topicsHTML}
    <div class="bottom-nav">
      <button class="btn btn-secondary" onclick="navigateCoreTopic(-1)">← Prev Topic</button>
      <span class="bn-info">${ct.topics.length} sub-topic${ct.topics.length > 1 ? 's' : ''}</span>
      <button class="btn btn-primary ${isDone ? 'btn-done' : ''}"
        onclick="markTopicDone()" id="mark-done-btn">
        ${isDone ? '✓ Done' : 'Mark Done ✓'}
      </button>
    </div>`;
}

// ── Toggle collapsible card ──
function toggleCard(ctId, ti) {
  const card = document.getElementById(`tc-${ctId}-${ti}`);
  if (card) card.classList.toggle('open');
}

// ── Navigate prev / next core topic ──
function navigateCoreTopic(dir) {
  const unit = UNITS[activeUnitIdx];
  const currentIdx = unit.coreTopics.findIndex(ct => ct.id === activeCoreTopic);
  const nextIdx = currentIdx + dir;
  if (nextIdx < 0 || nextIdx >= unit.coreTopics.length) return;
  const nextCt = unit.coreTopics[nextIdx];
  const btns = document.querySelectorAll('.core-topic-btn');
  selectCoreTopic(nextCt, btns[nextIdx], unit.color);
}

// ── Mark done — saves to localStorage, updates sidebar & progress ──
function markTopicDone() {
  if (!activeCoreTopic) return;

  completed.add(activeCoreTopic);
  saveCompleted();
  updateProgress();

  // Update sidebar button to show ✓
  const sbBtn = document.getElementById('sb-' + activeCoreTopic);
  if (sbBtn) {
    sbBtn.classList.add('ct-done');
    if (!sbBtn.querySelector('.ct-check')) {
      sbBtn.insertAdjacentHTML('beforeend', '<span class="ct-check">✓</span>');
    }
  }

  // Update the Mark Done button in the panel
  const markBtn = document.getElementById('mark-done-btn');
  if (markBtn) {
    markBtn.textContent = '✓ Done';
    markBtn.classList.add('btn-done');
  }

  // Auto-advance to next topic after brief pause
  setTimeout(() => navigateCoreTopic(1), 350);
}

// ── Apply saved done styles to sidebar after rebuild ──
// (already handled in buildSidebar via completed.has check)

// ── Reset all progress ──
function resetProgress() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  completed.clear();
  saveCompleted();
  updateProgress();
  // Rebuild sidebar to remove all ✓ ticks
  buildSidebar(UNITS[activeUnitIdx]);
  // If a panel is open, re-render it so Mark Done button resets
  if (activeCoreTopic) {
    const unit = UNITS[activeUnitIdx];
    const ct = unit.coreTopics.find(c => c.id === activeCoreTopic);
    if (ct) topicPanel.innerHTML = buildCoreTopicPanel(ct, unit.color);
  }
}

// ── Init ──
updateProgress();   // restore progress bar on load
selectUnit(0);
</script>
</body>
</html>
