{icon:"🔮",cls:"ti-e",title:"Privacy-First Marketing, First-Party Data, Community-Led Brands & Future Challenges",body:`
<div class="prose">
<h4>Privacy-First Marketing — The Structural Shift</h4>
<p>The deprecation of third-party cookies (Chrome: 2025 target), the decline of IDFA tracking on iOS (post iOS 14.5), and the increasing stringency of data protection regulation (GDPR, DPDP Act, California CCPA) are collectively forcing a structural transition in digital marketing: from surveillance-based personalisation (track users everywhere, build detailed profiles without their awareness) to consent-based engagement (build direct relationships where consumers actively choose to share data in exchange for clear value).</p>
<p>This is not merely a technical change — it is a strategic reorientation. The companies that built their marketing models on third-party data (tracking-based retargeting, lookalike audiences built from purchased data, cross-platform attribution) are exposed. The companies that built direct consumer relationships (email lists of opted-in subscribers, loyalty programme members, owned communities) are insulated. The privacy transition is, in effect, a forced market correction toward marketing models that consumers actually trust.</p>
<h4>First-Party Data Strategy — Building the Owned Audience</h4>
<p>First-party data is information collected directly from consumers with their explicit consent — through owned digital touchpoints (website, app, email, loyalty programme). It is the most valuable data asset in the post-cookie world because:</p>
<ul>
<li>It is consent-based — collected with the consumer's knowledge and agreement</li>
<li>It is accurate — comes directly from the consumer's actions, not inferred from third-party signals</li>
<li>It cannot be taken away — unlike platform-mediated audiences (Facebook followers, Amazon search rankings), owned email lists and loyalty programme databases belong to the brand</li>
<li>It improves with relationship depth — a customer who has made 10 purchases provides richer data than one who visited the website once</li>
</ul>
<p>Building first-party data requires <strong>value exchange</strong> — consumers don't share their data generously without clear benefit. Incentives: loyalty points for account creation, personalised recommendations in exchange for preference data, exclusive content for email subscribers, early access to sales for loyalty members. The foundation is a genuine benefit that makes data sharing feel worthwhile to the consumer, not a compliance checkbox.</p>
<h4>Community-Led Brands — Trust at Scale</h4>
<p>The most durable marketing asset a brand can build is an active, engaged community of customers who feel genuine connection to the brand — and to each other through it. Communities create brand value that advertising cannot replicate:</p>
<ul>
<li>Community members become brand advocates — generating authentic word-of-mouth that reaches audiences advertising doesn't</li>
<li>Communities provide direct product feedback channels — more honest and actionable than focus groups</li>
<li>Community belonging increases switching cost — consumers don't just lose a product when they switch brands; they lose social connections and status within the community</li>
<li>Community content (reviews, photos, tutorials, discussions) functions as user-generated content that reduces brand content creation cost and is more trusted than brand-produced content</li>
</ul>
<p>Indian examples: Zerodha's trading community (Tradingqna, Varsity discussions), Cult.fit's fitness community, Sugar Cosmetics' beauty creator community. Each of these communities has commercial value far exceeding what the same budget spent on paid advertising would produce.</p>
<h4>Long-Term Challenges — The Structural Headwinds</h4>
<ul>
<li><strong>Rising CAC — Market Saturation:</strong> As more brands compete for the same digital audiences with performance marketing, the cost per acquisition on every major channel (Google, Meta, marketplaces) rises. The "easy" digital consumers — urban, smartphone-owning, credit-card-holding, English-comfortable — are already heavily targeted. Reaching the next layer of consumers (Tier-2/3, vernacular, price-sensitive) requires different channels, different products, and different economics. CAC inflation is structural, not cyclical.</li>
<li><strong>Platform Gatekeeping — Algorithm Risk:</strong> Businesses built on platform-mediated distribution (Amazon organic ranking, Instagram organic reach, Google organic search) are permanently at risk of algorithm changes that can destroy their traffic overnight. Instagram's organic reach has declined from ~16% of followers in 2012 to ~3–5% in 2024 — brands that built audiences on Instagram now pay to reach them. Amazon's ranking algorithm changes can shift a product from page 1 to page 5 without notice or explanation. Platform dependency = algorithm risk, and algorithm risk is permanent.</li>
<li><strong>Consumer Attention Scarcity:</strong> The average Indian smartphone user receives 65–85 app notifications per day; is exposed to 4,000–10,000 brand messages across all channels; and has access to infinite entertainment alternatives (streaming, short video, gaming, social). The scarcest resource in digital marketing is not reach (easy to buy) but genuine attention and engagement. Brands that win will do so by being genuinely interesting, useful, or entertaining — not by being the loudest.</li>
</ul>
</div>
<div class="kp-box"><div class="kp-lbl">🔑 Key Points</div><ul>
<li>Privacy transition: surveillance-based → consent-based marketing; third-party cookie deprecation is the forcing function</li>
<li>First-party data: consent-based, accurate, owned, improves with depth — requires genuine value exchange to collect</li>
<li>Owned audience vs platform audience: email/loyalty lists cannot be taken away; Instagram followers → pay to reach them</li>
<li>Community: word-of-mouth + product feedback + switching cost + UGC — most durable marketing asset, not replicable by advertising</li>
<li>Rising CAC: structural (not cyclical) as easy digital consumers are already saturated; next layer requires different economics</li>
<li>Algorithm risk is permanent: Amazon page-1 → page-5 overnight; Instagram reach 16% (2012) → 3–5% (2024)</li>
</ul></div>`}
]}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc, arrayUnion, arrayRemove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase config ──
const firebaseConfig = {
  apiKey: "AIzaSyBiZfzS7OGEVrf95jwSHAYvwBHTbj1XY4k",
  authDomain: "ecom-6512e.firebaseapp.com",
  projectId: "ecom-6512e",
  storageBucket: "ecom-6512e.firebasestorage.app",
  messagingSenderId: "321834248691",
  appId: "1:321834248691:web:1d2eb15e1e5209ec1d8a86"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ──
let currentUser = null;
let activeUnitIdx = 0;
let activeCoreTopic = null;
let completedSet = new Set();
let notesCache = {};         // { topicId: [note1, note2, ...] }
let notesUnsubscribe = null;
let downloadsData = {};

const UNIT_COLORS = {U1:'#a78bfa',U2:'#22d3b0',U3:'#f5a623',U4:'#60a5fa',U5:'#e05c7a'};
const TOTAL_CORE  = UNITS.reduce((s,u)=>s+u.coreTopics.length,0);

// ── Expose globals needed by inline onclick handlers ──
window.doLogin         = doLogin;
window.doLogout        = doLogout;
window.resetProgress   = resetProgress;
window.toggleCard      = toggleCard;
window.navigateCoreTopic = navigateCoreTopic;
window.markTopicDone   = markTopicDone;
window.addNote         = addNote;
window.deleteNote      = deleteNote;
window.closeDlModal    = closeDlModal;
window.closeDlModalDirect = closeDlModalDirect;

// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Please enter email and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // onAuthStateChanged handles the rest
  } catch(e) {
    const msgs = {
      'auth/user-not-found':'No account with that email.',
      'auth/wrong-password':'Incorrect password.',
      'auth/invalid-email':'Invalid email address.',
      'auth/invalid-credential':'Incorrect email or password.',
      'auth/too-many-requests':'Too many attempts. Try again later.'
    };
    errEl.textContent = msgs[e.code] || 'Login failed. Check credentials.';
    btn.disabled = false; btn.textContent = 'Login';
    document.getElementById('loginPass').value = '';
  }
}

async function doLogout() {
  if (!confirm('Log out?')) return;
  if (notesUnsubscribe) { notesUnsubscribe(); notesUnsubscribe = null; }
  await signOut(auth);
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    // Dismiss login overlay
    const overlay = document.getElementById('loginOverlay');
    overlay.classList.add('fade-out');
    setTimeout(() => overlay.style.display = 'none', 400);
    // Show user badge
    document.getElementById('userBadge').textContent = user.email.split('@')[0];
    // Load data
    await loadProgress();
    await loadDownloads();
    initUI();
  } else {
    currentUser = null;
    completedSet = new Set();
    notesCache = {};
    // Show login overlay
    const overlay = document.getElementById('loginOverlay');
    overlay.style.display = 'flex';
    overlay.classList.remove('fade-out');
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Login';
    document.getElementById('loginError').textContent = '';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('userBadge').textContent = '';
    updateProgress();
  }
});

// ══════════════════════════════════════════════
// FIRESTORE — PROGRESS
// ══════════════════════════════════════════════
async function loadProgress() {
  if (!currentUser) return;
  try {
    const ref  = doc(db, 'users', currentUser.uid, 'data', 'progress');
    const snap = await getDoc(ref);
    if (snap.exists()) {
      completedSet = new Set(snap.data().completed || []);
    } else {
      completedSet = new Set();
    }
  } catch(e) { completedSet = new Set(); }
}

async function saveProgress() {
  if (!currentUser) return;
  try {
    const ref = doc(db, 'users', currentUser.uid, 'data', 'progress');
    await setDoc(ref, { completed: [...completedSet] }, { merge: true });
  } catch(e) {}
}

// ══════════════════════════════════════════════
// FIRESTORE — NOTES
// ══════════════════════════════════════════════
function subscribeNotes(topicId) {
  if (notesUnsubscribe) { notesUnsubscribe(); notesUnsubscribe = null; }
  if (!currentUser || !topicId) return;
  const ref = doc(db, 'users', currentUser.uid, 'notes', topicId);
  notesUnsubscribe = onSnapshot(ref, (snap) => {
    const notes = snap.exists() ? (snap.data().items || []) : [];
    notesCache[topicId] = notes;
    renderNotes(topicId, notes);
  });
}

async function addNote() {
  if (!currentUser || !activeCoreTopic) return;
  const ta  = document.getElementById('notesTextarea');
  const txt = ta.value.trim();
  if (!txt) return;
  const btn = document.getElementById('notesAddBtn');
  btn.disabled = true;
  document.getElementById('notesSaving').textContent = 'Saving...';
  try {
    const ref = doc(db, 'users', currentUser.uid, 'notes', activeCoreTopic);
    await setDoc(ref, { items: arrayUnion(txt) }, { merge: true });
    ta.value = '';
    document.getElementById('notesSaving').textContent = 'Saved ✓';
    setTimeout(() => document.getElementById('notesSaving').textContent = '', 1800);
  } catch(e) {
    document.getElementById('notesSaving').textContent = 'Save failed.';
  }
  btn.disabled = false;
}

async function deleteNote(topicId, noteIdx) {
  if (!currentUser) return;
  try {
    const ref  = doc(db, 'users', currentUser.uid, 'notes', topicId);
    const snap = await getDoc(ref);
    if (!snap.exists()) return;
    const items = [...(snap.data().items || [])];
    items.splice(noteIdx, 1);
    await setDoc(ref, { items }, { merge: false });
  } catch(e) { console.error('Delete note error:', e); }
}

function renderNotes(topicId, notes) {
  const list = document.getElementById('notesList');
  if (!list) return;
  if (!notes || notes.length === 0) {
    list.innerHTML = '<div class="notes-empty">No notes yet.<br>Add your first note below.</div>';
    return;
  }
  list.innerHTML = notes.map((n,i) => `
    <div class="note-item">
      <div class="note-text">${escHtml(n)}</div>
      <button class="note-del" onclick="deleteNote('${topicId}', ${i})" title="Delete note">✕</button>
    </div>`).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
// FIRESTORE — DOWNLOADS
// ══════════════════════════════════════════════
async function loadDownloads() {
  try {
    const ref  = doc(db, 'config', 'downloads');
    const snap = await getDoc(ref);
    if (snap.exists()) {
      downloadsData = snap.data();
    } else {
      // Create empty doc if not exists
      await setDoc(ref, {U1:{ppt:'',pdf:''},U2:{ppt:'',pdf:''},U3:{ppt:'',pdf:''},U4:{ppt:'',pdf:''},U5:{ppt:'',pdf:''}});
      downloadsData = {};
    }
    renderDownloadTable();
  } catch(e) { downloadsData = {}; }
}

function convertDriveLink(url) {
  if (!url || !url.trim()) return '';
  if (url.includes('uc?export=download')) return url.includes('confirm=t') ? url : url + '&confirm=t';
  let m = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m) return 'https://drive.google.com/uc?export=download&confirm=t&id=' + m[1];
  m = url.match(/open\?id=([^&]+)/);
  if (m) return 'https://drive.google.com/uc?export=download&confirm=t&id=' + m[1];
  return url;
}

function renderDownloadTable() {
  const tbody = document.getElementById('dlTableBody');
  if (!tbody) return;
  const names = {
    U1:'Unit 1 — Introduction to E-Commerce',
    U2:'Unit 2 — Laws, Security & Documents',
    U3:'Unit 3 — EDI, Payments & Digital Economy',
    U4:'Unit 4 — Search, Information & Infrastructure',
    U5:'Unit 5 — Marketing, Commercial Issues & Trends'
  };
  tbody.innerHTML = ['U1','U2','U3','U4','U5'].map(uid => {
    const d = downloadsData[uid] || {};
    const pptUrl = convertDriveLink(d.ppt || '');
    const pdfUrl = convertDriveLink(d.pdf || '');
    const pptLink = pptUrl
      ? `<a class="dl-link ppt" href="${pptUrl}" target="_blank">⬇ PPT</a>`
      : `<span class="dl-link na">Coming Soon</span>`;
    const pdfLink = pdfUrl
      ? `<a class="dl-link pdf" href="${pdfUrl}" target="_blank">⬇ PDF</a>`
      : `<span class="dl-link na">Coming Soon</span>`;
    return `<tr><td>${names[uid]}</td><td>${pptLink}</td><td>${pdfLink}</td></tr>`;
  }).join('');
}

function closeDlModal(e) {
  if (e.target === document.getElementById('dlModalBg')) closeDlModalDirect();
}
function closeDlModalDirect() {
  document.getElementById('dlModalBg').classList.remove('open');
}

// ══════════════════════════════════════════════
// UI ENGINE
// ══════════════════════════════════════════════
function initUI() {
  const nav = document.getElementById('unitnav');
  nav.innerHTML = '';
  UNITS.forEach((unit, ui) => {
    const btn = document.createElement('button');
    btn.className = 'unit-btn' + (ui === 0 ? ' active' : '');
    btn.textContent = unit.label;
    btn.onclick = () => selectUnit(ui);
    nav.appendChild(btn);
  });
  // Downloads button — not a unit-btn so it never gets active class
  const dlBtn = document.createElement('button');
  dlBtn.className = 'dl-nav-btn';
  dlBtn.textContent = '⬇ Downloads';
  dlBtn.onclick = () => document.getElementById('dlModalBg').classList.add('open');
  nav.appendChild(dlBtn);

  updateProgress();
  selectUnit(0);
}

function updateProgress() {
  const pct = Math.round((completedSet.size / TOTAL_CORE) * 100);
  const pbar = document.getElementById('pbar');
  const pcnt = document.getElementById('pcnt');
  if (pbar) pbar.style.width = pct + '%';
  if (pcnt) pcnt.textContent = `${completedSet.size} / ${TOTAL_CORE} Core Topics Covered`;
}

function selectUnit(ui) {
  activeUnitIdx = ui;
  activeCoreTopic = null;
  if (notesUnsubscribe) { notesUnsubscribe(); notesUnsubscribe = null; }
  document.querySelectorAll('.unit-btn').forEach((b,i) => b.classList.toggle('active', i === ui));
  buildSidebar(UNITS[ui]);
  const unit = UNITS[ui];
  const utd = document.getElementById('unit-title-display');
  utd.style.display = 'block';
  utd.innerHTML = `<div class="unit-title-display" style="--unit-color:${unit.color}">
    <div class="utd-tag">${unit.label}</div><h2>${unit.title}</h2></div>`;
  document.getElementById('welcome-screen').style.display = 'flex';
  document.getElementById('topic-panel').style.display = 'none';
  resetNotesPanel();
}

function buildSidebar(unit) {
  const list  = document.getElementById('sidebar-list');
  const color = UNIT_COLORS[unit.id] || '#a78bfa';
  list.innerHTML = '';
  unit.coreTopics.forEach((ct, ci) => {
    const isDone = completedSet.has(ct.id);
    const btn = document.createElement('button');
    btn.className = 'core-topic-btn' + (isDone ? ' ct-done' : '');
    btn.id = 'sb-' + ct.id;
    btn.style.setProperty('--active-color', color);
    btn.innerHTML = `<span class="ct-num">${String(ci+1).padStart(2,'0')}</span>
      <span class="ct-label">${ct.label}</span>
      ${isDone ? '<span class="ct-check">✓</span>' : ''}`;
    btn.onclick = () => selectCoreTopic(ct, btn, color);
    list.appendChild(btn);
  });
}

function selectCoreTopic(ct, btn, unitColor) {
  activeCoreTopic = ct.id;
  document.querySelectorAll('.core-topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('unit-title-display').style.display = 'none';
  document.getElementById('welcome-screen').style.display = 'none';
  const panel = document.getElementById('topic-panel');
  panel.style.display = 'block';
  panel.innerHTML = buildCoreTopicPanel(ct, unitColor);
  document.getElementById('content-area').scrollTop = 0;
  // Notes panel
  document.getElementById('notesPanelSub').textContent = ct.label;
  document.getElementById('notesAddBtn').disabled = false;
  document.getElementById('notesList').innerHTML = '<div class="notes-empty">Loading notes...</div>';
  subscribeNotes(ct.id);
}

function buildCoreTopicPanel(ct, unitColor) {
  const isDone = completedSet.has(ct.id);
  const topicsHTML = ct.topics.map((t, ti) => `
    <div class="topic-card" id="tc-${ct.id}-${ti}">
      <div class="topic-head" onclick="toggleCard('${ct.id}',${ti})">
        <div class="t-icon ${t.cls}">${t.icon}</div>
        <div class="topic-title">${t.title}</div>
        <div class="topic-arrow">▼</div>
      </div>
      <div class="topic-body">${t.body}</div>
    </div>`).join('');
  return `
    <div class="ct-panel-hdr">
      <div class="ct-tag" style="color:${unitColor}">${UNITS[activeUnitIdx].label} · Core Area</div>
      <h2>${ct.label}</h2>
    </div>
    ${topicsHTML}
    <div class="bottom-nav">
      <button class="btn btn-secondary" onclick="navigateCoreTopic(-1)">← Prev</button>
      <span class="bn-info">${ct.topics.length} topic${ct.topics.length>1?'s':''}</span>
      <button class="btn btn-primary ${isDone?'btn-done':''}" onclick="markTopicDone()" id="mark-done-btn">
        ${isDone?'✓ Done':'Mark Done ✓'}
      </button>
    </div>`;
}

function toggleCard(ctId, ti) {
  const card = document.getElementById(`tc-${ctId}-${ti}`);
  if (!card) return;
  card.classList.toggle('open');
  if (card.classList.contains('open')) {
    card.querySelectorAll('.bar-inner').forEach(b => {
      const w = b.style.width; b.style.width = '0';
      setTimeout(() => { b.style.width = w; }, 60);
    });
  }
}

function navigateCoreTopic(dir) {
  const unit = UNITS[activeUnitIdx];
  const idx  = unit.coreTopics.findIndex(ct => ct.id === activeCoreTopic);
  const next = idx + dir;
  if (next < 0 || next >= unit.coreTopics.length) return;
  const nextCt = unit.coreTopics[next];
  const btns   = document.querySelectorAll('.core-topic-btn');
  selectCoreTopic(nextCt, btns[next], UNIT_COLORS[unit.id] || '#a78bfa');
}

async function markTopicDone() {
  if (!activeCoreTopic) return;
  completedSet.add(activeCoreTopic);
  updateProgress();
  await saveProgress();
  const sbBtn = document.getElementById('sb-' + activeCoreTopic);
  if (sbBtn) {
    sbBtn.classList.add('ct-done');
    if (!sbBtn.querySelector('.ct-check'))
      sbBtn.insertAdjacentHTML('beforeend', '<span class="ct-check">✓</span>');
  }
  const markBtn = document.getElementById('mark-done-btn');
  if (markBtn) { markBtn.textContent = '✓ Done'; markBtn.classList.add('btn-done'); }
  setTimeout(() => navigateCoreTopic(1), 350);
}

async function resetProgress() {
  if (!confirm('Reset all your progress? This cannot be undone.')) return;
  completedSet.clear();
  updateProgress();
  await saveProgress();
  buildSidebar(UNITS[activeUnitIdx]);
  if (activeCoreTopic) {
    const unit = UNITS[activeUnitIdx];
    const ct   = unit.coreTopics.find(c => c.id === activeCoreTopic);
    if (ct) document.getElementById('topic-panel').innerHTML =
      buildCoreTopicPanel(ct, UNIT_COLORS[unit.id] || '#a78bfa');
  }
}

function resetNotesPanel() {
  document.getElementById('notesPanelSub').textContent = 'Select a core topic to add notes';
  document.getElementById('notesList').innerHTML = '<div class="notes-empty">Your notes for this topic will appear here.</div>';
  document.getElementById('notesAddBtn').disabled = true;
  document.getElementById('notesTextarea').value = '';
  document.getElementById('notesSaving').textContent = '';
}

// Enter key in notes textarea
document.getElementById('notesTextarea').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addNote();
});

// Enter key on login
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginEmail').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPass').focus();
});
</script>
</body>
</html>
